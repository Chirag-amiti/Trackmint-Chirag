name: Build and deploy ASP.Net Core app to Azure Web App - trackmint-api-chirag

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore backend/PersonalFinanceTracker.Api/PersonalFinanceTracker.Api.csproj

      - name: Build
        run: dotnet build backend/PersonalFinanceTracker.Api/PersonalFinanceTracker.Api.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish backend/PersonalFinanceTracker.Api/PersonalFinanceTracker.Api.csproj --configuration Release --no-build --output ./publish

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: net-app
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: net-app
          path: ./publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_08F3689CE9BF4B02B1D7FC1A2B684C57 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_BE17E20C41584ABAAA40EA1023B4A579 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B17F1B8E327A43F18B4804092442507C }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'trackmint-api-chirag'
          slot-name: 'Production'
          package: ./publish
